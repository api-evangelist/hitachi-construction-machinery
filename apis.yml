name: Hitachi Construction Machinery
description: >-
  Hitachi Construction Machinery provides operational data about the machines
  and equipment owned and operated on construction sites to customers and
  dealers through the Telematics API, which complies with the ISO 15143-3 (AEMP
  2.0) standard.Operational data provided by the Telematics API realizes higher
  efficiency, productivity, and safety as well as reduces life cycle costs. 
